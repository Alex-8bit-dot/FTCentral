<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FTCentral</title>
<!-- 
  IMPORTANT: This file must be HOSTED to work -- opening from file:// blocks CORS.
  Free hosting in 60 seconds: go to https://netlify.com/drop and drag this file onto the page.
  Or use VS Code Live Server extension, or any local HTTP server.

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0A0C14;--bg1:#0F1220;--bg2:#141828;--bg3:#1B2035;
  --cyan:#00E5FF;--cyan-dim:#00B8CC;
  --orange:#FF6B35;
  --text:#E8EAF0;--muted:#7A82A0;--dim:#4A5068;
  --border:rgba(0,229,255,0.12);--border-hi:rgba(0,229,255,0.30);
  --green:#00C896;--red:#FF6B6B;
}
body{background:var(--bg0);color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:3px}
a{color:var(--cyan);text-decoration:none}a:hover{text-decoration:underline}
input,textarea,select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;border-radius:6px;padding:10px 14px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.08)}
select option{background:var(--bg2)}
.grid-bg{background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:40px 40px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.fade-in{animation:fadeIn .35s ease both}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Exo 2',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:10px 22px;border:none;border-radius:6px;cursor:pointer;transition:opacity .2s,transform .1s;text-decoration:none;white-space:nowrap}
.btn:hover{opacity:.88;text-decoration:none}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan-dim));color:var(--bg0)}
.btn-orange{background:linear-gradient(135deg,var(--orange),#CC5528);color:#fff}
.btn-ghost{background:transparent;color:var(--cyan);border:1px solid var(--border);font-weight:600}
.btn-ghost:hover{border-color:var(--cyan);background:rgba(0,229,255,.06)}
.btn-sm{padding:7px 14px;font-size:12px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:24px;transition:border-color .2s}
.card:hover{border-color:var(--border-hi)}
.nav-btn{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:6px 12px;border-radius:6px;transition:color .2s,background .2s;border:none;background:none;font-family:'Exo 2',sans-serif}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}.nav-btn.active{color:var(--cyan)}
.badge{display:inline-flex;align-items:center;background:rgba(0,229,255,.1);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid rgba(0,229,255,.2)}
.lbl{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.shimmer{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:14px;margin-bottom:12px}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:none;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
.tab:hover{color:var(--text)}.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.pbar-wrap{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:5px}
.pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--cyan-dim));transition:width .6s ease}
.rlink{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:10px;transition:border-color .2s,background .2s;text-decoration:none;color:inherit}
.rlink:hover{border-color:var(--cyan);background:rgba(0,229,255,.04);text-decoration:none}
.rlink-icon{width:36px;height:36px;border-radius:8px;background:rgba(0,229,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bubble{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:14px}
.bubble.mine{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.25);margin-left:48px}
.note-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--muted);white-space:pre-wrap;margin-top:12px}
.page{max-width:1100px;margin:0 auto;padding:40px 24px 80px}
.page-title{font-size:28px;font-weight:700;letter-spacing:-.01em;color:var(--text);margin-bottom:4px}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.ev-card{background:var(--bg1);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:8px;padding:16px 20px;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:8px;background:rgba(0,229,255,.08);border:1px solid var(--border);border-radius:20px;padding:5px 14px 5px 8px;font-size:13px;color:var(--text)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cyan-dim));color:var(--bg0);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:14px;color:var(--muted);border:none;background:none;width:100%;text-align:left;font-family:'Exo 2',sans-serif}
.sidebar-item:hover{background:rgba(0,229,255,.06);color:var(--text)}.sidebar-item.active{background:rgba(0,229,255,.1);color:var(--cyan)}
nav{background:var(--bg1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:58px;gap:8px}
.logo{cursor:pointer;display:flex;align-items:center;gap:10px;margin-right:16px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--cyan-dim));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-weight:700;font-size:16px;color:var(--bg0)}
.logo-text{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--text)}
.logo-text span{color:var(--cyan)}
footer{border-top:1px solid var(--border);background:var(--bg1);padding:24px;text-align:center}
[hidden]{display:none!important}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.full-col{grid-column:1/-1}
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat-box{background:var(--bg2);border-radius:8px;padding:10px 4px;text-align:center}
.stat-num{font-family:'Share Tech Mono',monospace;font-size:22px;line-height:1}
.stat-lbl{font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:.06em}
.info-block{background:var(--bg2);border-radius:8px;overflow:hidden;margin-bottom:14px}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.info-lbl{font-size:12px;color:var(--muted);width:88px;flex-shrink:0}
.info-val{font-size:13px;color:var(--text);font-weight:500}
.award-tag{background:rgba(255,107,53,.1);color:var(--orange);border:1px solid rgba(255,107,53,.22);border-radius:5px;font-size:11px;padding:3px 9px;margin:2px}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <div class="logo" onclick="showPage('home')">
      <div class="logo-icon">F</div>
      <div class="logo-text">FTC<span>entral</span></div>
    </div>
    <div style="display:flex;gap:2px;flex:1" id="nav-links"></div>
    <div id="nav-auth"></div>
  </div>
</nav>

<!-- PAGES -->
<div id="page-home"></div>
<div id="page-dashboard" hidden></div>
<div id="page-messages" hidden></div>
<div id="page-scouting" hidden></div>
<div id="page-learning" hidden></div>
<div id="page-register" hidden></div>

<!-- FOOTER -->
<footer>
  <p style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);letter-spacing:.1em">
    FTCENTRAL &bull; BUILT WITH HEART BY THE
    <a href="https://ftcscout.org/teams/27318" target="_blank" style="color:var(--cyan)">MANTABOTS -- TEAM 27318</a>
    &bull; FASNY
  </p>
  <p style="font-size:12px;color:var(--dim);margin-top:5px">
    Live data from <a href="https://ftcscout.org" target="_blank">FTC Scout</a> &bull;
    <a href="https://ftcbonfire.app" target="_blank">FTC Bonfire</a> &bull;
    <a href="https://ftcvideos.org" target="_blank">FTC Videos</a>
  </p>
</footer>

<script>
// ─── APP STATE ───────────────────────────────────────────────────────────────
let currentPage = 'home';
let currentUser = null;
const scoutNotes = {};

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const PAGES = ['home','dashboard','messages','scouting','learning','register'];

function renderNav() {
  const links = document.getElementById('nav-links');
  links.innerHTML = PAGES.map(id => {
    const label = id === 'messages' ? '💬 Messages' : id.charAt(0).toUpperCase() + id.slice(1);
    return `<button class="nav-btn ${currentPage===id?'active':''}" onclick="showPage('${id}')">${label}</button>`;
  }).join('');

  const auth = document.getElementById('nav-auth');
  if (currentUser) {
    const teamBadge = currentUser.team ? `<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan)">#${currentUser.team}</span>` : '';
    auth.innerHTML = `
      <div class="chip" style="gap:8px">
        <div class="avatar">${currentUser.name[0].toUpperCase()}</div>
        <span>${currentUser.name}</span>${teamBadge}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()" style="margin-left:10px">Log out</button>`;
  } else {
    auth.innerHTML = `<button class="btn btn-cyan btn-sm" onclick="showPage('home')">Sign In</button>`;
  }
}

function showPage(id) {
  currentPage = id;
  PAGES.forEach(p => {
    document.getElementById('page-'+p).hidden = (p !== id);
  });
  renderNav();
  if (id === 'home')      renderHome();
  if (id === 'dashboard') renderDashboard();
  if (id === 'messages')  renderMessages();
  if (id === 'scouting')  renderScouting();
  if (id === 'learning')  renderLearning();
  if (id === 'register')  renderRegister();
  window.scrollTo(0,0);
}

function logout() {
  currentUser = null;
  showPage('home');
}

// ─── HOME / LOGIN ─────────────────────────────────────────────────────────────
function renderHome() {
  const el = document.getElementById('page-home');
  el.className = 'grid-bg';
  el.style.minHeight = 'calc(100vh - 59px)';
  el.innerHTML = `
  <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 59px);padding:24px">
  <div style="max-width:960px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center">
    <div class="fade-in">
      <div class="lbl" style="margin-bottom:16px">FTC Robotics Platform</div>
      <h1 style="font-size:44px;font-weight:700;line-height:1.15;color:var(--text);margin-bottom:20px">
        All your team needs.<br><span style="color:var(--cyan)">One place.</span>
      </h1>
      <p style="color:var(--muted);font-size:15px;line-height:1.75;margin-bottom:36px">
        FTCentral unifies team messaging, <strong style="color:var(--cyan)">live scouting data from FTC Scout</strong>, learning resources, and event coordination for every FTC team worldwide.
      </p>
      <div style="display:flex;gap:28px">
        ${[['6','Modules'],['10K+','Teams'],['Live','FTC Data']].map(([n,l])=>`
        <div style="text-align:center">
          <div style="font-family:'Share Tech Mono',monospace;font-size:${n.length>4?24:40}px;color:var(--cyan);line-height:1">${n}</div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">${l}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card fade-in" style="animation-delay:.1s">
      <div class="tab-bar" id="auth-tabs">
        <button class="tab active" onclick="switchAuthMode('login')">Sign In</button>
        <button class="tab" onclick="switchAuthMode('signup')">Create Account</button>
      </div>
      <div id="auth-form"></div>
    </div>
  </div></div>`;
  renderAuthForm('login');
}

let authMode = 'login';
function switchAuthMode(mode) {
  authMode = mode;
  document.querySelectorAll('#auth-tabs .tab').forEach((t,i)=>{
    t.classList.toggle('active', (mode==='login'&&i===0)||(mode==='signup'&&i===1));
  });
  renderAuthForm(mode);
}

function renderAuthForm(mode) {
  const el = document.getElementById('auth-form');
  if (!el) return;
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px">
      ${['Full Name|name|text|Your name','Email|email|email|you@example.com','Password|password|password|••••••••'].map(f=>{
        const [lbl,id,type,ph] = f.split('|');
        return `<div><div style="font-size:12px;color:var(--muted);margin-bottom:5px">${lbl}</div>
          <input type="${type}" id="auth-${id}" placeholder="${ph}" onkeydown="if(event.key==='Enter')doLogin()"></div>`;
      }).join('')}
      ${mode==='signup'?`
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:5px">Your Role</div>
          <select id="auth-role" onchange="toggleTeamField()">
            <option value="member">Team Member / Student</option>
            <option value="coach">Coach / Mentor</option>
            <option value="other">FTC-Related (no team)</option>
          </select>
        </div>
        <div id="team-field">
          <div style="font-size:12px;color:var(--muted);margin-bottom:5px">FTC Team Number</div>
          <input type="text" id="auth-team" placeholder="e.g. 27318" onkeydown="if(event.key==='Enter')doLogin()">
        </div>`:''}
      <div id="auth-err" style="color:var(--red);font-size:13px;display:none"></div>
      <button class="btn btn-cyan" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()">
        ${mode==='login'?'Sign In':'Create Account'}
      </button>
      <p style="text-align:center;font-size:12px;color:var(--dim)">
        Built by the <a href="https://ftcscout.org/teams/27318" target="_blank">Mantabots (27318)</a>
      </p>
    </div>`;
}

function toggleTeamField() {
  const role = document.getElementById('auth-role')?.value;
  const tf = document.getElementById('team-field');
  if (tf) tf.hidden = (role === 'other');
}

function doLogin() {
  const name  = document.getElementById('auth-name')?.value.trim();
  const email = document.getElementById('auth-email')?.value.trim();
  const pass  = document.getElementById('auth-password')?.value.trim();
  const role  = document.getElementById('auth-role')?.value || 'member';
  const team  = document.getElementById('auth-team')?.value.trim() || '';
  const err   = document.getElementById('auth-err');

  if (!name || !email || !pass) { err.textContent='Please fill in all fields.'; err.hidden=false; return; }
  if (authMode==='signup' && role!=='other' && !team) { err.textContent='Please enter your team number.'; err.hidden=false; return; }
  err.hidden = true;
  currentUser = { name, email, role, team };
  showPage('dashboard');
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
const EVENTS_DATA = [
  {name:"FTC Game Kickoff 2025-26",        date:"Sep 6, 2025", loc:"Virtual / Worldwide",           type:"kickoff"},
  {name:"INTO THE DEEP Qualifier -- NY",   date:"Nov 2, 2025", loc:"FASNY, New York",               type:"qualifier"},
  {name:"NY Regional Championship",        date:"Jan 18, 2026",loc:"Albany, NY",                    type:"regional"},
  {name:"World Championship -- Houston",   date:"Apr 16, 2026",loc:"Houston Convention Center, TX", type:"worlds"},
  {name:"Scrimmage @ Mantabots HQ",        date:"Oct 5, 2025", loc:"FASNY, NYC",                    type:"scrimmage"},
];
let communityFeed = [
  {from:"Team 12345",      text:"Anyone have extra motor controllers?",        time:"10:32 AM"},
  {from:"Team 8801",       text:"We have 2 REV Expansion Hubs available!",     time:"10:35 AM"},
  {from:"Mantabots 27318", text:"Hosting a scrimmage Oct 5 -- DM us to join!", time:"10:41 AM"},
];

function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  const greeting = currentUser
    ? `Welcome back, ${currentUser.name}${currentUser.team?' -- Team #'+currentUser.team:''}.`
    : 'Welcome to FTCentral.';
  el.innerHTML = `
  <div class="page fade-in">
    <div class="lbl">Command Center</div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-sub">${greeting} Upcoming events and community feed.</p>
    <div class="two-col">
      <div>
        <div class="lbl" style="margin-bottom:14px">Upcoming Events</div>
        ${EVENTS_DATA.map(ev=>`
          <div class="ev-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <div style="font-weight:600;font-size:14px;color:var(--text)">${ev.name}</div>
              <span class="badge ${ev.type==='worlds'?'badge-orange':''}">${ev.type}</span>
            </div>
            <div style="font-size:12px;color:var(--muted)">
              <span style="color:var(--orange);font-family:monospace">${ev.date}</span> &bull; ${ev.loc}
            </div>
          </div>`).join('')}
        <a href="https://ftc-events.firstinspires.org" target="_blank" class="btn btn-ghost btn-sm" style="margin-top:8px">View all FIRST events &rarr;</a>
      </div>
      <div>
        <div class="lbl" style="margin-bottom:14px">Community Feed</div>
        <div class="card" style="padding:16px">
          <div id="feed-msgs" style="max-height:260px;overflow-y:auto;margin-bottom:14px"></div>
          <div style="display:flex;gap:10px">
            <input id="feed-input" placeholder="${currentUser?'Post to community feed...':'Sign in to post...'}"
              ${!currentUser?'disabled':''} onkeydown="if(event.key==='Enter')sendFeed()" style="flex:1">
            <button class="btn btn-cyan btn-sm" onclick="sendFeed()" ${!currentUser?'disabled':''}>Send</button>
          </div>
        </div>
        <div class="lbl" style="margin-top:24px;margin-bottom:14px">Quick Access</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${[['💬','Message Teams','messages'],['🔭','Scout a Team','scouting'],['📚','Learning Hub','learning'],['📋','Register Team','register']].map(([i,l,p])=>`
            <button class="card" onclick="showPage('${p}')" style="cursor:pointer;text-align:left;padding:14px;background:var(--bg2);border-radius:10px">
              <div style="font-size:20px;margin-bottom:6px">${i}</div>
              <div style="font-size:13px;font-weight:600">${l}</div>
            </button>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
  renderFeed();
}

function renderFeed() {
  const el = document.getElementById('feed-msgs');
  if (!el) return;
  const myName = currentUser ? `${currentUser.name}${currentUser.team?` (${currentUser.team})`:''}` : 'You';
  el.innerHTML = communityFeed.map(m=>{
    const mine = m.from === myName;
    return `<div class="bubble ${mine?'mine':''}">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:${mine?'var(--cyan)':'var(--muted)'};font-weight:600">${m.from}</span>
        <span style="font-size:11px;color:var(--dim)">${m.time}</span>
      </div>
      <div style="color:var(--text)">${m.text}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function sendFeed() {
  const inp = document.getElementById('feed-input');
  if (!inp || !inp.value.trim() || !currentUser) return;
  const myName = `${currentUser.name}${currentUser.team?` (${currentUser.team})`:''}`;
  const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  communityFeed.push({from:myName, text:inp.value.trim(), time:now});
  inp.value = '';
  renderFeed();
}

// ─── MESSAGES ────────────────────────────────────────────────────────────────
let conversations = {
  '8801': [
    {from:'Iron Giants (8801)', text:'Hey Mantabots! Great match last weekend.', time:'Yesterday 4:12 PM', mine:false},
    {from:'You',                text:'Thanks! Your auto was really impressive.',  time:'Yesterday 4:18 PM', mine:true},
    {from:'Iron Giants (8801)', text:'We use Road Runner -- happy to share our paths!', time:'Yesterday 4:20 PM', mine:false},
  ],
  '12345': [
    {from:'Cyber Eagles (12345)', text:'Are you coming to the qualifier next month?', time:'Mon 2:30 PM', mine:false},
    {from:'You',                  text:'Yes! We are registered. See you there.',       time:'Mon 2:45 PM', mine:true},
  ],

  renderChatMessages();
  renderConvoList();

    'Got it, thanks!','Sounds good. See you at the event!',
    "We're working on that too -- let's collaborate.",
    'Can you share your CAD files?',
    'What programming language do you use for auto?',
    'Great idea! We will bring it up with our coach.',

// ─── SCOUTING ────────────────────────────────────────────────────────────────
// This is the key feature. We call api.ftcscout.org/graphql DIRECTLY from the browser.
// This works when hosted (not file://) because FTC Scout's Apollo Server
// sets Access-Control-Allow-Origin: * for hosted origins.
// Running from file:// is blocked by CORS -- host on Netlify Drop or any server.

const SEASON = 2024; // INTO THE DEEP

async function scoutTeam(number) {
  // Query 1: basic team info -- only fields confirmed valid on Team type
  // (city/state are NOT on Team type per GraphQL validation error)
  const INFO_QUERY = `
    query($n: Int!) {
      teamByNumber(number: $n) {
        number
        name
        schoolName
        rookieYear
        location {
          venue
          city
          stateProv
          country
        }
      }
    }`;

  const post = async (query, variables) => {
    const r = await fetch('https://api.ftcscout.org/graphql', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query, variables}),
    });
    if (!r.ok) {
      const body = await r.text();
      throw new Error(`HTTP ${r.status}: ${body.slice(0,300)}`);
    }
    return r.json();
  };

  // FTC Scout uses MatchScores2025 for INTO THE DEEP (2024-25 season ends 2025)
  // We try 2025 first (as the FTC Scout Discord specified), then fall back to 2024
  const makeStatsQuery = (scoreType) => `
    query($n: Int!, $s: Int!) {
      teamByNumber(number: $n) {
        quickStats(season: $s) {
          tot  { value rank }
          auto { value rank }
          dc   { value rank }
          eg   { value rank }
        }
        matches(season: $s) {
          alliance
          match {
            scores {
              ... on ${scoreType} {
                blue { totalPointsNp }
                red  { totalPointsNp }
              }
            }
          }
        }
      }
    }`;

  const [infoRes, statsRes] = await Promise.all([
    post(INFO_QUERY, {n: number}),
    // Try MatchScores2025 first; if it fails with a GraphQL error, try 2024
    post(makeStatsQuery('MatchScores2025'), {n: number, s: SEASON})
      .catch(() => post(makeStatsQuery('MatchScores2024'), {n: number, s: SEASON})),
  ]);

  const info  = infoRes.data?.teamByNumber;
  const sData = statsRes.data?.teamByNumber;

  if (!info) return null; // team not found

  // Calculate W/L/T from matches array
  let wins=0, losses=0, ties=0, highScore=null, totalPts=0, matchCount=0;
  for (const m of (sData?.matches||[])) {
    const sc = m.match?.scores;
    if (!sc) continue;
    const ours = m.alliance==='Red' ? sc.red?.totalPointsNp : sc.blue?.totalPointsNp;
    const opp  = m.alliance==='Red' ? sc.blue?.totalPointsNp : sc.red?.totalPointsNp;
    if (ours==null||opp==null) continue;
    matchCount++;
    totalPts += ours;
    if (highScore===null||ours>highScore) highScore=ours;
    if (ours>opp) wins++; else if (ours<opp) losses++; else ties++;
  }

  const qs = sData?.quickStats;

  return {
    number,
    name:       info.name,
    school:     info.schoolName || null,
    location:   info.location
                  ? [info.location.city, info.location.stateProv, info.location.country].filter(Boolean).join(', ')
                  : null,
    rookieYear: info.rookieYear || null,
    season:     'INTO THE DEEP (2024-2025)',
    awards:     [],
    recentEvents: [],
    stats: qs ? {
      totalOPR:     qs.tot?.value  ?? null,
      totalOPRRank: qs.tot?.rank   ?? null,
      autoOPR:      qs.auto?.value ?? null,
      autoOPRRank:  qs.auto?.rank  ?? null,
      dcOPR:        qs.dc?.value   ?? null,
      dcOPRRank:    qs.dc?.rank    ?? null,
      egOPR:        qs.eg?.value   ?? null,
      egOPRRank:    qs.eg?.rank    ?? null,
      highScore,
      avgScore: matchCount>0 ? Math.round(totalPts/matchCount) : null,
      wins, losses, ties,
    } : null,
  };
}

async function doScout() {
  const inp = document.getElementById('scout-input');
  const num = parseInt(inp?.value);
  if (!num||num<1) { showScoutError('Please enter a valid FTC team number.'); return; }
  scoutNum = num;

  document.getElementById('scout-error').style.display='none';
  document.getElementById('scout-loading').style.display='block';
  document.getElementById('scout-result').innerHTML='';
  document.getElementById('scout-notes-section').style.display='none';
  document.getElementById('scout-btn').disabled=true;
  document.getElementById('scout-btn').textContent='Searching...';

  const statuses = ['Querying FTC Scout API...','Loading team profile...','Fetching season stats...','Reading match history...'];
  let si=0;
  const ticker = setInterval(()=>{ si=(si+1)%statuses.length; const s=document.getElementById('scout-status'); if(s)s.textContent=statuses[si]; },1800);

  try {
    const data = await scoutTeam(num);
    clearInterval(ticker);
    document.getElementById('scout-loading').style.display='none';
    document.getElementById('scout-btn').disabled=false;
    document.getElementById('scout-btn').textContent='Search';

    if (!data) {
      showScoutError(`Team #${num} was not found on FTC Scout. Check the team number.`);
      return;
    }
    scoutData = data;
    renderScoutResult(data);

    // Notes
    document.getElementById('scout-notes-section').style.display='block';
    document.getElementById('scout-notes-lbl').textContent=`Scouting Notes -- Team #${num}`;
    const saved = scoutNotes[num];
    if (saved) {
      document.getElementById('scout-notes-input').value = saved;
      document.getElementById('note-text').textContent = saved;
      document.getElementById('note-display').style.display='block';
    }
  } catch(e) {
    clearInterval(ticker);
    document.getElementById('scout-loading').style.display='none';
    document.getElementById('scout-btn').disabled=false;
    document.getElementById('scout-btn').textContent='Search';
    showScoutError(`Error: ${e.message}. Make sure you're running this file in a browser (not inside Claude).`);
  }
}

    {icon:'📖',title:'FTC Game Manual Part 2',desc:'Scoring, field setup, and game-specific rules',url:'https://www.firstinspires.org/robotics/ftc/game-and-season'},
    {icon:'🌐',title:'FIRST Tech Challenge Website',desc:'Official FTC news, registration, and resources',url:'https://www.firstinspires.org/robotics/ftc'},
    {icon:'📅',title:'FTC Events Portal',desc:'Find qualifiers, regionals, and championships near you',url:'https://ftc-events.firstinspires.org'},
  ],
  'Programming': [
    {icon:'☕',title:'FTC Java SDK (GitHub)',desc:'Official SDK with Java examples and OpMode templates',url:'https://github.com/FIRST-Tech-Challenge/FtcRobotController'},
    {icon:'🔧',title:'REV Robotics Documentation',desc:'Control Hub, Expansion Hub, and hardware guides',url:'https://docs.revrobotics.com'},
    {icon:'💡',title:'FTC Programming Resources',desc:'Official Java and Blocks tutorials for FTC',url:'https://ftc-docs.firstinspires.org/en/latest/programming_resources/'},
    {icon:'🎮',title:'Game Manual Zero',desc:"Community plain-English guide to FTC engineering",url:'https://gm0.org'},
    {icon:'🤖',title:'Road Runner Library',desc:'Advanced autonomous motion planning for FTC',url:'https://learnroadrunner.com'},
    {icon:'📐',title:'MeepMeep Visualizer',desc:'Visualize Road Runner paths before writing code',url:'https://github.com/NoahBres/MeepMeep'},
  ],
  'Scouting': [
    {icon:'🔭',title:'FTC Scout',desc:'Live stats, OPR, world rankings, and full match history',url:'https://ftcscout.org'},
    {icon:'🔥',title:'FTC Bonfire',desc:'Deep performance analytics and team comparisons',url:'https://ftcbonfire.app'},
    {icon:'🎥',title:'FTC Videos',desc:'Watch match footage from every FTC event worldwide',url:'https://ftcvideos.org'},
  ],
  'Design / CAD': [
    {icon:'🔩',title:'OnShape FTC Tutorial',desc:'Free browser-based CAD widely used in FTC',url:'https://learn.onshape.com'},
    {icon:'📦',title:'GoBilda Part Library',desc:'CAD models for GoBilda motors, servos, and structural',url:'https://www.gobilda.com/cad/'},
    {icon:'🏗️',title:'REV Design Resources',desc:'CAD files and design guides from REV Robotics',url:'https://www.revrobotics.com/resources/'},
  ],
};
let learnTab = 'Official';

function renderLearning() {
  const el = document.getElementById('page-learning');
  el.innerHTML = `
  <div class="page fade-in">
    <div class="lbl">Knowledge Base</div>
    <h1 class="page-title">Learning Hub</h1>
    <p class="page-sub">FTC rules, Java programming, scouting tools, and design resources -- curated by the Mantabots</p>
    <div class="tab-bar">
      ${Object.keys(RESOURCES).map(cat=>`<button class="tab ${learnTab===cat?'active':''}" onclick="switchLearnTab('${cat}')">${cat}</button>`).join('')}
    </div>
    <div id="learn-items"></div>
    <div style="margin-top:40px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:8px;padding:16px 20px">
      <div style="font-weight:600;color:var(--orange);margin-bottom:6px">Want to contribute a resource?</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">
        Have a guide or tool that helped your team? Email the Mantabots at <a href="mailto:mantabots@fasny.com">mantabots@fasny.com</a> and we will add it to the hub.
      </div>
    </div>
  </div>`;
  renderLearnItems();
}

function switchLearnTab(cat) {
  learnTab = cat;
  document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.toggle('active',t.textContent===cat));
  renderLearnItems();
}

function renderLearnItems() {
  const el = document.getElementById('learn-items');
  if (!el) return;
  el.innerHTML = (RESOURCES[learnTab]||[]).map(item=>`
    <a href="${item.url}" target="_blank" class="rlink">
      <div class="rlink-icon">${item.icon}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px;color:var(--text)">${item.title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${item.desc}</div>
      </div>
      <div style="color:var(--cyan);font-size:14px;flex-shrink:0">&#8599;</div>
    </a>`).join('');
}

// ─── REGISTER ────────────────────────────────────────────────────────────────
let registeredTeams = [
  {number:27318,name:'Mantabots',     school:'FASNY',           city:'Mamaroneck',   state:'NY'},
  {number:8801, name:'Iron Giants',   school:'Westchester HS',  city:'White Plains', state:'NY'},
  {number:12345,name:'Cyber Eagles',  school:'Brooklyn Tech',   city:'Brooklyn',     state:'NY'},
];

function renderRegister() {
  const el = document.getElementById('page-register');
  el.innerHTML = `
  <div class="page fade-in">
    <div class="lbl">Team Registry</div>
    <h1 class="page-title">Register Your Team</h1>
    <p class="page-sub">Join the FTCentral network so other teams can find and collaborate with you</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start">
      <div class="card">
        <div class="lbl" style="margin-bottom:18px">New Registration</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          ${[['Team Number *','reg-num','e.g. 27318'],['Team Name *','reg-name','e.g. Mantabots'],['School / Org *','reg-school','e.g. FASNY']].map(([l,id,ph])=>`
            <div>
              <div style="font-size:12px;color:var(--muted);margin-bottom:5px">${l}</div>
              <input id="${id}" placeholder="${ph}" onkeydown="if(event.key==='Enter')doRegister()">
            </div>`).join('')}
          <div style="display:grid;grid-template-columns:1fr 80px;gap:10px">
            <div><div style="font-size:12px;color:var(--muted);margin-bottom:5px">City</div><input id="reg-city" placeholder="e.g. New York"></div>
            <div><div style="font-size:12px;color:var(--muted);margin-bottom:5px">State</div><input id="reg-state" placeholder="NY"></div>
          </div>
          <div id="reg-err" style="color:var(--red);font-size:13px;display:none"></div>
          <div id="reg-ok"  style="color:var(--green);font-size:13px;display:none">&#10003; Team registered!</div>
          <button class="btn btn-orange" style="width:100%;justify-content:center" onclick="doRegister()">Register Team</button>
        </div>
      </div>
      <div>
        <div class="lbl" style="margin-bottom:14px">Registered Teams -- <span style="color:var(--cyan)" id="team-count"></span></div>
        <div id="team-list"></div>
      </div>
    </div>
  </div>`;
  renderTeamList();
}

function renderTeamList() {
  const el = document.getElementById('team-list');
  const cnt = document.getElementById('team-count');
  if (cnt) cnt.textContent = registeredTeams.length + ' total';
  if (!el) return;
  el.innerHTML = registeredTeams.map(t=>`
    <div class="card" style="margin-bottom:10px;padding:14px 18px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:14px">${t.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${t.school} &bull; ${[t.city,t.state].filter(Boolean).join(', ')}</div>
        </div>
        <a href="https://ftcscout.org/teams/${t.number}" target="_blank" class="badge" style="text-decoration:none">#${t.number}</a>
      </div>
    </div>`).join('');
}

function doRegister() {
  const num    = document.getElementById('reg-num')?.value.trim();
  const name   = document.getElementById('reg-name')?.value.trim();
  const school = document.getElementById('reg-school')?.value.trim();
  const city   = document.getElementById('reg-city')?.value.trim();
  const state  = document.getElementById('reg-state')?.value.trim();
  const err    = document.getElementById('reg-err');
  const ok     = document.getElementById('reg-ok');

  if (!num||!name||!school) { err.textContent='Team number, name, and school are required.'; err.style.display='block'; ok.style.display='none'; return; }
  if (registeredTeams.find(t=>t.number===parseInt(num))) { err.textContent='This team number is already registered.'; err.style.display='block'; ok.style.display='none'; return; }
  err.style.display='none';
  registeredTeams.push({number:parseInt(num),name,school,city,state});
  ['reg-num','reg-name','reg-school','reg-city','reg-state'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  ok.style.display='block';
  setTimeout(()=>ok.style.display='none',3000);
  renderTeamList();
}
